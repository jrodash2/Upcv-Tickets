{% extends 'diplomas/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center mt-5" style="padding-top: 40px;"><div class="card shadow p-4" style="width: 70%; max-width: 760px;"><h4 class="text-center mb-4">Editar asignación</h4><form method="POST">{% csrf_token %}<div class="mb-3">{{ form.usuario.label_tag }}{{ form.usuario }}</div><div class="mb-3">{{ form.ubicacion.label_tag }}{{ form.ubicacion }}</div><div class="text-end mt-3"><button class="btn btn-primary">Guardar Cambios</button><a href="{% url 'diplomas:asignaciones_ubicacion_lista' %}" class="btn btn-dark">Cancelar</a></div></form></div></div>
{% endblock %}
